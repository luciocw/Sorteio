<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sorteio de Grupos</title>
    
    <!-- PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Sorteio">
    <meta name="theme-color" content="#121212" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
    <meta name="description" content="Sorteio de grupos simples e rápido">
    
    <!-- PWA Icons -->
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%232563eb' width='100' height='100' rx='20'/><text x='50' y='68' font-size='50' text-anchor='middle' fill='white'>🎲</text></svg>">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%232563eb' width='100' height='100' rx='20'/><text x='50' y='68' font-size='50' text-anchor='middle' fill='white'>🎲</text></svg>">
    
    <!-- Manifest inline via data URI -->
    <link rel="manifest" href="data:application/json,%7B%22name%22%3A%22Sorteio%20de%20Grupos%22%2C%22short_name%22%3A%22Sorteio%22%2C%22description%22%3A%22Sorteio%20de%20grupos%20simples%20e%20r%C3%A1pido%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23121212%22%2C%22theme_color%22%3A%22%232563eb%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%2C%3Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20viewBox%3D%270%200%20100%20100%27%3E%3Crect%20fill%3D%27%25232563eb%27%20width%3D%27100%27%20height%3D%27100%27%20rx%3D%2720%27%2F%3E%3Ctext%20x%3D%2750%27%20y%3D%2768%27%20font-size%3D%2750%27%20text-anchor%3D%27middle%27%20fill%3D%27white%27%3E%F0%9F%8E%B2%3C%2Ftext%3E%3C%2Fsvg%3E%22%2C%22sizes%22%3A%22any%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%2C%22purpose%22%3A%22any%20maskable%22%7D%5D%7D">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f5f5f5;
            --bg-card: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #666666;
            --border: #e0e0e0;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --success: #16a34a;
            --group-1: #3b82f6;
            --group-2: #10b981;
            --group-3: #f59e0b;
            --group-4: #ef4444;
            --group-5: #8b5cf6;
            --group-6: #ec4899;
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        [data-theme="dark"] {
            --bg-primary: #121212;
            --bg-secondary: #1e1e1e;
            --bg-card: #252525;
            --text-primary: #f0f0f0;
            --text-secondary: #a0a0a0;
            --border: #333333;
            --accent: #3b82f6;
            --accent-hover: #60a5fa;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            min-height: -webkit-fill-available;
            transition: background-color 0.3s, color 0.3s;
            padding-top: var(--safe-top);
            padding-bottom: var(--safe-bottom);
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
            padding-bottom: calc(2rem + var(--safe-bottom));
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 600;
        }

        .theme-toggle {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-size: 1.25rem;
            transition: all 0.2s;
        }

        .theme-toggle:hover {
            border-color: var(--accent);
        }

        .config-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .config-title {
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 1rem;
            color: var(--text-secondary);
        }

        .config-row {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .config-item {
            flex: 1;
            min-width: 150px;
        }

        .config-item label {
            display: block;
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
        }

        .config-item input[type="number"] {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            background: var(--bg-secondary);
            color: var(--text-primary);
            transition: border-color 0.2s;
        }

        .config-item input[type="number"]:focus {
            outline: none;
            border-color: var(--accent);
        }

        .names-section {
            margin-top: 1rem;
        }

        .names-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .paste-btn {
            font-size: 0.8rem;
            padding: 0.4rem 0.75rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .paste-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .names-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 0.75rem;
            margin-top: 0.75rem;
        }

        .name-input {
            padding: 0.625rem 0.875rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.9rem;
            background: var(--bg-secondary);
            color: var(--text-primary);
            transition: border-color 0.2s;
        }

        .name-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .name-input::placeholder {
            color: var(--text-secondary);
        }

        .groups-names {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
        }

        .btn-primary {
            width: 100%;
            padding: 1rem;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .btn-secondary {
            padding: 0.75rem 1.5rem;
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-secondary:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .results-section {
            margin-top: 2rem;
            display: none;
        }

        .results-section.visible {
            display: block;
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .results-title {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .groups-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
        }

        .group-card {
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.4s ease forwards;
        }

        .group-card[data-group="1"] { border-top-color: var(--group-1); }
        .group-card[data-group="2"] { border-top-color: var(--group-2); }
        .group-card[data-group="3"] { border-top-color: var(--group-3); }
        .group-card[data-group="4"] { border-top-color: var(--group-4); }
        .group-card[data-group="5"] { border-top-color: var(--group-5); }
        .group-card[data-group="6"] { border-top-color: var(--group-6); }

        .group-header {
            padding: 1rem;
            font-weight: 600;
            font-size: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .group-card[data-group="1"] .group-header { background: var(--group-1); color: white; }
        .group-card[data-group="2"] .group-header { background: var(--group-2); color: white; }
        .group-card[data-group="3"] .group-header { background: var(--group-3); color: white; }
        .group-card[data-group="4"] .group-header { background: var(--group-4); color: white; }
        .group-card[data-group="5"] .group-header { background: var(--group-5); color: white; }
        .group-card[data-group="6"] .group-header { background: var(--group-6); color: white; }

        .group-members {
            padding: 0.5rem;
        }

        .member {
            padding: 0.75rem 1rem;
            border-radius: 6px;
            margin: 0.25rem 0;
            background: var(--bg-secondary);
            font-size: 0.95rem;
        }

        .action-buttons {
            display: flex;
            gap: 0.75rem;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }

        .action-buttons .btn-secondary {
            flex: 1;
            min-width: 100px;
        }

        /* Shuffle animation overlay */
        .shuffle-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .shuffle-overlay.visible {
            display: flex;
        }

        .shuffle-icon {
            font-size: 4rem;
            animation: shake 0.15s infinite;
        }

        .shuffle-text {
            margin-top: 1rem;
            font-size: 1.25rem;
            color: white;
            font-weight: 500;
        }

        @keyframes shake {
            0%, 100% { transform: rotate(-15deg); }
            50% { transform: rotate(15deg); }
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Paste modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1500;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .modal-overlay.visible {
            display: flex;
        }

        .modal {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 1.5rem;
            width: 100%;
            max-width: 500px;
            max-height: 80vh;
            overflow: auto;
        }

        .modal-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .modal-subtitle {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }

        .modal textarea {
            width: 100%;
            height: 200px;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.9rem;
            background: var(--bg-secondary);
            color: var(--text-primary);
            resize: vertical;
            font-family: inherit;
        }

        .modal textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        .modal-buttons {
            display: flex;
            gap: 0.75rem;
            margin-top: 1rem;
        }

        .modal-buttons button {
            flex: 1;
        }

        /* iOS standalone mode adjustments */
        @media all and (display-mode: standalone) {
            body {
                padding-top: calc(var(--safe-top) + 10px);
            }
        }

        @media (max-width: 600px) {
            .container {
                padding: 1.5rem 1rem;
            }

            h1 {
                font-size: 1.4rem;
            }

            .config-row {
                flex-direction: column;
                gap: 1rem;
            }

            .names-grid {
                grid-template-columns: 1fr;
            }

            .groups-container {
                grid-template-columns: 1fr;
            }
        }

        /* Install prompt */
        .install-prompt {
            display: none;
            position: fixed;
            bottom: calc(1rem + var(--safe-bottom));
            left: 1rem;
            right: 1rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            z-index: 1000;
        }

        .install-prompt.visible {
            display: block;
        }

        .install-prompt-content {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .install-prompt-icon {
            font-size: 2rem;
        }

        .install-prompt-text {
            flex: 1;
        }

        .install-prompt-text strong {
            display: block;
            margin-bottom: 0.25rem;
        }

        .install-prompt-text small {
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        .install-prompt-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-secondary);
            padding: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Sorteio de Grupos</h1>
            <button class="theme-toggle" onclick="toggleTheme()" title="Alternar tema">🌙</button>
        </header>

        <div class="config-section">
            <div class="config-title">Configuração</div>
            <div class="config-row">
                <div class="config-item">
                    <label for="numParticipants">Número de participantes</label>
                    <input type="number" id="numParticipants" value="12" min="2" max="100" onchange="updateInputs()">
                </div>
                <div class="config-item">
                    <label for="numGroups">Número de grupos</label>
                    <input type="number" id="numGroups" value="3" min="1" max="20" onchange="updateInputs()">
                </div>
            </div>

            <div class="names-section">
                <div class="names-header">
                    <div class="config-title" style="margin-bottom: 0;">Nomes dos Participantes</div>
                    <button class="paste-btn" onclick="openPasteModal('participants')">📋 Colar lista</button>
                </div>
                <div class="names-grid" id="participantsGrid"></div>
            </div>

            <div class="groups-names">
                <div class="names-header">
                    <div class="config-title" style="margin-bottom: 0;">Nomes dos Grupos</div>
                    <button class="paste-btn" onclick="openPasteModal('groups')">📋 Colar lista</button>
                </div>
                <div class="names-grid" id="groupsGrid"></div>
            </div>
        </div>

        <button class="btn-primary" id="sortearBtn" onclick="sortear()">Sortear</button>

        <div class="results-section" id="resultsSection">
            <div class="results-header">
                <div class="results-title">Resultado do Sorteio</div>
            </div>
            <div class="groups-container" id="groupsContainer"></div>
            <div class="action-buttons">
                <button class="btn-secondary" onclick="sortear()">Sortear Novamente</button>
                <button class="btn-secondary" onclick="copiarResultado()">Copiar</button>
                <button class="btn-secondary" onclick="compartilharResultado()">Compartilhar</button>
            </div>
        </div>
    </div>

    <!-- Shuffle animation overlay -->
    <div class="shuffle-overlay" id="shuffleOverlay">
        <div class="shuffle-icon">🎲</div>
        <div class="shuffle-text">Sorteando...</div>
    </div>

    <!-- Paste modal -->
    <div class="modal-overlay" id="pasteModal">
        <div class="modal">
            <div class="modal-title">Colar Lista</div>
            <div class="modal-subtitle">Cole os nomes separados por vírgula, ponto-e-vírgula ou um por linha</div>
            <textarea id="pasteTextarea" placeholder="João, Maria, Pedro&#10;ou&#10;João&#10;Maria&#10;Pedro"></textarea>
            <div class="modal-buttons">
                <button class="btn-secondary" onclick="closePasteModal()">Cancelar</button>
                <button class="btn-primary" onclick="applyPastedList()">Aplicar</button>
            </div>
        </div>
    </div>

    <!-- Install prompt for iOS -->
    <div class="install-prompt" id="installPrompt">
        <div class="install-prompt-content">
            <div class="install-prompt-icon">🎲</div>
            <div class="install-prompt-text">
                <strong>Instalar App</strong>
                <small>Toque em <strong>Compartilhar</strong> e depois <strong>Adicionar à Tela de Início</strong></small>
            </div>
            <button class="install-prompt-close" onclick="closeInstallPrompt()">×</button>
        </div>
    </div>

    <script>
        let currentPasteTarget = 'participants';

        // Theme management
        function initTheme() {
            const saved = localStorage.getItem('theme');
            if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.setAttribute('data-theme', 'dark');
                document.querySelector('.theme-toggle').textContent = '☀️';
            }
        }

        function toggleTheme() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
            document.querySelector('.theme-toggle').textContent = isDark ? '🌙' : '☀️';
            localStorage.setItem('theme', isDark ? 'light' : 'dark');
        }

        // Input management
        function updateInputs() {
            const numParticipants = parseInt(document.getElementById('numParticipants').value) || 12;
            const numGroups = parseInt(document.getElementById('numGroups').value) || 3;

            const participantsGrid = document.getElementById('participantsGrid');
            const currentParticipants = Array.from(participantsGrid.querySelectorAll('input')).map(i => i.value);
            
            participantsGrid.innerHTML = '';
            for (let i = 0; i < numParticipants; i++) {
                const input = document.createElement('input');
                input.type = 'text';
                input.className = 'name-input';
                input.placeholder = `Participante ${i + 1}`;
                input.value = currentParticipants[i] || '';
                participantsGrid.appendChild(input);
            }

            const groupsGrid = document.getElementById('groupsGrid');
            const currentGroups = Array.from(groupsGrid.querySelectorAll('input')).map(i => i.value);
            
            groupsGrid.innerHTML = '';
            for (let i = 0; i < numGroups; i++) {
                const input = document.createElement('input');
                input.type = 'text';
                input.className = 'name-input';
                input.placeholder = `Grupo ${i + 1}`;
                input.value = currentGroups[i] || '';
                groupsGrid.appendChild(input);
            }
        }

        // Paste modal
        function openPasteModal(target) {
            currentPasteTarget = target;
            document.getElementById('pasteTextarea').value = '';
            document.getElementById('pasteModal').classList.add('visible');
            document.getElementById('pasteTextarea').focus();
        }

        function closePasteModal() {
            document.getElementById('pasteModal').classList.remove('visible');
        }

        function applyPastedList() {
            const text = document.getElementById('pasteTextarea').value;
            const names = text
                .split(/[,;\n]+/)
                .map(n => n.trim())
                .filter(n => n.length > 0);

            if (names.length === 0) {
                closePasteModal();
                return;
            }

            if (currentPasteTarget === 'participants') {
                document.getElementById('numParticipants').value = names.length;
                updateInputs();
                const inputs = document.querySelectorAll('#participantsGrid input');
                names.forEach((name, i) => {
                    if (inputs[i]) inputs[i].value = name;
                });
            } else {
                document.getElementById('numGroups').value = names.length;
                updateInputs();
                const inputs = document.querySelectorAll('#groupsGrid input');
                names.forEach((name, i) => {
                    if (inputs[i]) inputs[i].value = name;
                });
            }

            closePasteModal();
        }

        // Shuffle function
        function shuffle(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // Vibration feedback
        function vibrate() {
            if ('vibrate' in navigator) {
                navigator.vibrate([50, 30, 50]);
            }
        }

        // Main draw function with animation
        function sortear() {
            const btn = document.getElementById('sortearBtn');
            btn.disabled = true;

            // Show shuffle animation
            document.getElementById('shuffleOverlay').classList.add('visible');
            vibrate();

            // Simulate shuffling delay for effect
            setTimeout(() => {
                document.getElementById('shuffleOverlay').classList.remove('visible');
                performDraw();
                btn.disabled = false;
                vibrate();
            }, 800);
        }

        function performDraw() {
            const participantInputs = document.querySelectorAll('#participantsGrid input');
            const groupInputs = document.querySelectorAll('#groupsGrid input');

            const participants = Array.from(participantInputs).map((input, i) => 
                input.value.trim() || `Participante ${i + 1}`
            );

            const groups = Array.from(groupInputs).map((input, i) => 
                input.value.trim() || `Grupo ${i + 1}`
            );

            const shuffled = shuffle(participants);
            const numGroups = groups.length;
            const groupArrays = Array.from({ length: numGroups }, () => []);

            shuffled.forEach((participant, i) => {
                groupArrays[i % numGroups].push(participant);
            });

            const container = document.getElementById('groupsContainer');
            container.innerHTML = '';

            groups.forEach((groupName, i) => {
                const card = document.createElement('div');
                card.className = 'group-card';
                card.setAttribute('data-group', (i % 6) + 1);
                card.style.animationDelay = `${i * 0.1}s`;

                const header = document.createElement('div');
                header.className = 'group-header';
                header.textContent = groupName;

                const members = document.createElement('div');
                members.className = 'group-members';

                groupArrays[i].forEach(member => {
                    const memberDiv = document.createElement('div');
                    memberDiv.className = 'member';
                    memberDiv.textContent = member;
                    members.appendChild(memberDiv);
                });

                card.appendChild(header);
                card.appendChild(members);
                container.appendChild(card);
            });

            document.getElementById('resultsSection').classList.add('visible');
            document.getElementById('resultsSection').scrollIntoView({ behavior: 'smooth' });

            window.lastResult = { groups, groupArrays };
        }

        // Generate result text
        function getResultText() {
            if (!window.lastResult) return '';

            const { groups, groupArrays } = window.lastResult;
            let text = '🎲 RESULTADO DO SORTEIO\n';
            text += '━'.repeat(25) + '\n\n';

            groups.forEach((groupName, i) => {
                text += `📌 ${groupName}\n`;
                groupArrays[i].forEach(member => {
                    text += `   • ${member}\n`;
                });
                text += '\n';
            });

            return text.trim();
        }

        // Copy result function
        function copiarResultado() {
            const text = getResultText();
            if (!text) return;

            navigator.clipboard.writeText(text).then(() => {
                const btn = document.querySelector('.action-buttons .btn-secondary:nth-child(2)');
                const original = btn.textContent;
                btn.textContent = '✓ Copiado!';
                setTimeout(() => btn.textContent = original, 2000);
            });
        }

        // Share result function (native share)
        function compartilharResultado() {
            const text = getResultText();
            if (!text) return;

            if (navigator.share) {
                navigator.share({
                    title: 'Resultado do Sorteio',
                    text: text
                }).catch(() => {
                    // User cancelled or error - fallback to copy
                    copiarResultado();
                });
            } else {
                // Fallback for browsers without Web Share API
                copiarResultado();
            }
        }

        // iOS install prompt
        function checkInstallPrompt() {
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
            const isStandalone = window.navigator.standalone === true;
            const dismissed = localStorage.getItem('installPromptDismissed');

            if (isIOS && !isStandalone && !dismissed) {
                setTimeout(() => {
                    document.getElementById('installPrompt').classList.add('visible');
                }, 3000);
            }
        }

        function closeInstallPrompt() {
            document.getElementById('installPrompt').classList.remove('visible');
            localStorage.setItem('installPromptDismissed', 'true');
        }

        // Close modal on overlay click
        document.getElementById('pasteModal').addEventListener('click', function(e) {
            if (e.target === this) closePasteModal();
        });

        // Service Worker registration
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:text/javascript;charset=utf-8,' + encodeURIComponent(`
                const CACHE_NAME = 'sorteio-v2';
                self.addEventListener('install', e => self.skipWaiting());
                self.addEventListener('activate', e => e.waitUntil(clients.claim()));
                self.addEventListener('fetch', e => {
                    e.respondWith(
                        caches.match(e.request).then(r => r || fetch(e.request))
                    );
                });
            `)).catch(() => {});
        }

        // Initialize
        initTheme();
        updateInputs();
        checkInstallPrompt();
    </script>
</body>
</html>
